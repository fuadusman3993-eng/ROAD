name: Godot Android Build & Deploy

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master

jobs:
  build_and_deploy:
    name: Build & Deploy Android
    runs-on: ubuntu-latest
    container: barichello/godot-ci:4.2.1
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Setup Environment
        run: |
          mkdir -p ~/.android
          keytool -genkey -v -keystore ~/.android/debug.keystore -storepass android -alias androiddebugkey -keypass android -keyalg RSA -keysize 2048 -validity 10000 -dname "CN=Android Debug,O=Android,C=US"
          mkdir -p ~/.config/godot
          echo '[resource]' > ~/.config/godot/editor_settings-4.tres
          echo 'export/android/android_sdk_path = "/usr/lib/android-sdk"' >> ~/.config/godot/editor_settings-4.tres
          echo 'export/android/debug_keystore = "/root/.android/debug.keystore"' >> ~/.config/godot/editor_settings-4.tres
          echo 'export/android/debug_keystore_user = "androiddebugkey"' >> ~/.config/godot/editor_settings-4.tres
          echo 'export/android/debug_keystore_pass = "android"' >> ~/.config/godot/editor_settings-4.tres

      - name: Export APK
        run: |
          mkdir -p build/android
          godot --headless --export-debug "Android" build/android/ROAD.apk

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ROAD-Android-APK
          path: build/android/ROAD.apk

      - name: Deploy to Itch.io
        if: github.ref == 'refs/heads/master' && github.event_name == 'push'
        env:
          BUTLER_API_KEY: ${{ secrets.BUTLER_API_KEY }}
          ITCH_USER: ${{ secrets.ITCH_USERNAME }}
          ITCH_GAME: road
        run: |
          curl -L -o butler.zip https://broth.itch.ovh/butler/linux-amd64/LATEST/archive/default
          unzip butler.zip
          chmod +x butler
          ./butler push build/android/ROAD.apk $ITCH_USER/$ITCH_GAME:android --userversion 1.0
