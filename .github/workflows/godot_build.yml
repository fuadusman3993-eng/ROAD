name: Godot Android FINAL Build & Deploy

on:
  push:
    branches:
      - master

jobs:
  build:
    name: Build Android APK
    runs-on: ubuntu-latest
    container: barichello/godot-ci:4.2.1
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Setup Android SDK & Keystore
        run: |
          # 1. Generate Debug Keystore in project root (res://debug.keystore)
          keytool -genkey -v -keystore debug.keystore -storepass android -alias androiddebugkey -keypass android -keyalg RSA -keysize 2048 -validity 10000 -dname "CN=Android Debug,O=Android,C=US"
          
          # 2. Relocate Pre-installed Templates to GitHub Home
          mkdir -vp /github/home/.local/share/godot/export_templates/
          cp -r /root/.local/share/godot/export_templates/* /github/home/.local/share/godot/export_templates/ || true
          
          # 3. Dynamically find Android SDK path
          if [ -d "/usr/lib/android-sdk" ]; then
            SDK_PATH="/usr/lib/android-sdk"
          elif [ -d "/usr/local/lib/android/sdk" ]; then
            SDK_PATH="/usr/local/lib/android/sdk"
          else
            SDK_PATH=$(find /usr -name "platform-tools" -type d -print -quit | sed 's/\/platform-tools//')
          fi
          echo "Using Android SDK at: $SDK_PATH"
          
          # 4. Configure Godot Editor Settings for GitHub Home
          mkdir -vp /github/home/.config/godot
          echo '[resource]' > /github/home/.config/godot/editor_settings-4.tres
          echo "export/android/android_sdk_path = \"$SDK_PATH\"" >> /github/home/.config/godot/editor_settings-4.tres
          echo "export/android/debug_keystore = \"$GITHUB_WORKSPACE/debug.keystore\"" >> /github/home/.config/godot/editor_settings-4.tres
          echo 'export/android/debug_keystore_user = "androiddebugkey"' >> /github/home/.config/godot/editor_settings-4.tres
          echo 'export/android/debug_keystore_pass = "android"' >> /github/home/.config/godot/editor_settings-4.tres

      - name: Verify Environment (Logging Only)
        run: |
          echo "Checking for Export Templates..."
          ls -R /root/.local/share/godot/export_templates/ || echo "Templates not found in default path!"

      - name: Godot Headless Import
        run: |
          godot --headless --editor --quit || true

      - name: Export APK
        run: |
          mkdir -vp build/android
          godot --headless --verbose --export-debug "Android" ./ROAD.apk
          mv -v ./ROAD.apk build/android/ROAD.apk

      - name: Debug Global Search
        run: |
          echo "Searching for any generated APK files..."
          find . -name "*.apk"

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ROAD-Android-APK
          path: build/android/ROAD.apk
          if-no-files-found: error

  deploy:
    name: Deploy to Itch.io
    needs: build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/master' && github.event_name == 'push'
    steps:
      - name: Download Build Artifact
        uses: actions/download-artifact@v4
        with:
          name: ROAD-Android-APK
          path: build/android/

      - name: Upload to Itch.io
        uses: robpc/itchio-upload-action@v1
        with:
          path: build/android/ROAD.apk
          project: ${{ secrets.ITCH_USERNAME }}/road
          channel: android
          api-key: ${{ secrets.BUTLER_API_KEY }}
