name: Godot Build and Deploy

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master

jobs:
  build:
    name: Build Godot Project
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Setup Godot
        uses: chickensoft/setup-godot@v2
        with:
          version: 4.2.1

      - name: Build Windows Export
        run: |
          mkdir -v -p build/win
          godot --headless --export-release "Windows Desktop" build/win/ROAD.exe

      - name: Zip Build Output
        run: |
          cd build/win && zip -r ../../ROAD-Build.zip .

      - name: Upload Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Windows-Build
          path: ROAD-Build.zip

  deploy:
    name: Deploy to Itch.io
    needs: build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/master' && github.event_name == 'push'
    steps:
      - name: Download Build Artifact
        uses: actions/download-artifact@v4
        with:
          name: Windows-Build
          path: .

      - name: Deploy to Itch.io using Butler
        uses: manleydev/butler-publish-itchio-action@master
        env:
          BUTLER_CREDENTIALS: ${{ secrets.BUTLER_API_KEY }}
          CHANNEL: windows
          ITCH_GAME: road
          ITCH_USER: ${{ secrets.ITCH_USERNAME }}
          PACKAGE: ROAD-Build.zip
