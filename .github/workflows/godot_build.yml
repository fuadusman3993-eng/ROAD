name: Godot Build and Deploy

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master

jobs:
  build:
    name: Build Godot Project
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Generate Debug Keystore
        run: |
          keytool -genkey -v -keystore debug.keystore -storepass android -alias androiddebugkey -keypass android -keyalg RSA -keysize 2048 -validity 10000 -dname "CN=Android Debug,O=Android,C=US"

      - name: Configure Godot Editor Settings
        run: |
          mkdir -vp ~/.config/godot
          echo '[resource]' > ~/.config/godot/editor_settings-4.tres
          echo 'export/android/android_sdk_path = "'$ANDROID_HOME'"' >> ~/.config/godot/editor_settings-4.tres
          echo 'export/android/debug_keystore = "'$GITHUB_WORKSPACE'/debug.keystore"' >> ~/.config/godot/editor_settings-4.tres
          echo 'export/android/debug_keystore_user = "androiddebugkey"' >> ~/.config/godot/editor_settings-4.tres
          echo 'export/android/debug_keystore_pass = "android"' >> ~/.config/godot/editor_settings-4.tres

      - name: Prepare Build Directory
        run: mkdir -v -p build/android

      - name: Godot Export
        uses: firebelley/godot-export@v7.0.0
        with:
          godot_executable_download_url: https://github.com/godotengine/godot/releases/download/4.2.1-stable/Godot_v4.2.1-stable_linux.x86_64.zip
          godot_export_templates_download_url: https://github.com/godotengine/godot/releases/download/4.2.1-stable/Godot_v4.2.1-stable_export_templates.tpz
          relative_project_path: ./
          archive_output: true
          export_debug: true

      - name: Upload Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Android-Build
          path: /home/runner/.local/share/godot/archives/Android.zip

  deploy:
    name: Deploy to Itch.io
    needs: build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/master' && github.event_name == 'push'
    steps:
      - name: Download Build Artifact
        uses: actions/download-artifact@v4
        with:
          name: Android-Build
          path: .

      - name: Deploy to Itch.io using Butler
        uses: manleydev/butler-publish-itchio-action@master
        env:
          BUTLER_CREDENTIALS: ${{ secrets.BUTLER_API_KEY }}
          CHANNEL: android
          ITCH_GAME: road
          ITCH_USER: ${{ secrets.ITCH_USERNAME }}
          PACKAGE: Android.zip
