name: Build and Deploy to Itch.io

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master

jobs:
  build:
    name: Build Unreal Project
    runs-on: self-hosted
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Build Project
        # Using cmd shell ensures GitHub variables like ${{ github.workspace }} are resolved correctly.
        shell: cmd
        run: |
          "C:\Program Files\Epic Games\UE_5.4\Engine\Build\BatchFiles\RunUAT.bat" BuildCookRun -project="${{ github.workspace }}\ROAD.uproject" -noP4 -platform=Win64 -clientconfig=Shipping -serverconfig=Shipping -cook -allmaps -build -stage -pak -archive -archivedirectory="${{ github.workspace }}\Packaged" -prereqs -nodebuginfo

      - name: Verify Build Output
        shell: pwsh
        run: |
          if (Test-Path "${{ github.workspace }}\Packaged\Windows") {
              Write-Host "Build directory found."
              Get-ChildItem -Path "${{ github.workspace }}\Packaged\Windows" -Recurse
          } else {
              Write-Error "Build directory NOT found! Build likely failed."
              exit 1
          }

      - name: Zip Build Output
        # Compresses the contents of the Windows folder into a single Zip file
        shell: pwsh
        run: |
          Compress-Archive -Path "${{ github.workspace }}\Packaged\Windows\*" -DestinationPath "${{ github.workspace }}\ROAD-Build.zip" -Force

      - name: Upload Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Windows-Build
          path: ROAD-Build.zip
          if-no-files-found: error

  deploy:
    name: Deploy to Itch.io
    needs: build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/master' && github.event_name == 'push'
    steps:
      - name: Download Build Artifact
        uses: actions/download-artifact@v4
        with:
          name: Windows-Build
          path: .

      - name: Deploy to Itch.io using Butler
        uses: manleydev/butler-publish-itchio-action@master
        env:
          BUTLER_CREDENTIALS: ${{ secrets.BUTLER_API_KEY }}
          CHANNEL: windows
          ITCH_GAME: road
          ITCH_USER: ${{ secrets.ITCH_USERNAME }}
          PACKAGE: ROAD-Build.zip
