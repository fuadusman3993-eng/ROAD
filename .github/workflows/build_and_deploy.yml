name: Build and Deploy to Itch.io

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build:
    name: Build Unreal Project
    runs-on: self-hosted
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Build Project
        # Using cmd shell ensures GitHub variables like ${{ github.workspace }} are resolved correctly.
        # Note: Local VS Code IntelliSense errors (like 'CoreMinimal.h not found') 
        # do not affect this build process. UBT will compile the code successfully.
        shell: cmd
        run: |
          RunUAT.bat BuildCookRun -project="${{ github.workspace }}\ROAD.uproject" -noP4 -platform=Win64 -clientconfig=Shipping -serverconfig=Shipping -cook -allmaps -build -stage -pak -archive -archivedirectory="${{ github.workspace }}\Packaged"

      - name: Zip Build Output
        # Compresses the packaged game into a single Zip file
        shell: pwsh
        run: |
          Compress-Archive -Path "${{ github.workspace }}\Packaged\*" -DestinationPath "${{ github.workspace }}\ROAD-Build.zip" -Force

      - name: Upload Build Artifact
        uses: actions/upload-artifact@v3
        with:
          name: Windows-Build
          path: ROAD-Build.zip
          # Fails the step if the Zip file wasn't created, preventing false "Success" statuses
          if-no-files-found: error

  deploy:
    name: Deploy to Itch.io
    needs: build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - name: Download Build Artifact
        uses: actions/download-artifact@v3
        with:
          name: Windows-Build
          path: build/

      - name: Deploy to Itch.io using Butler
        uses: manleydev/butler-publish-itchio-action@master
        env:
          BUTLER_CREDENTIALS: ${{ secrets.BUTLER_API_KEY }}
          CHANNEL: windows
          ITCH_GAME: road
          ITCH_USER: ${{ secrets.ITCH_USERNAME }}
          # Points directly to the downloaded Zip file
          PACKAGE: build/ROAD-Build.zip
